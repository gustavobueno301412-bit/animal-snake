<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍Link Up Animal Snake🐍</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a1a;
            --board-bg: #222;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: manipulation; overflow: hidden;
        }

        .game-title {
            font-size: 28px; font-weight: bold; color: var(--primary); margin-top: 10px;
            text-shadow: 2px 2px #000; letter-spacing: 2px;
        }

        /* Menu de Seleção */
        .animal-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
            background: #333; padding: 10px; border-radius: 15px; margin: 10px;
            max-height: 110px; overflow-y: auto; width: 90vw; border: 2px solid #444;
        }
        .animal-grid button {
            font-size: 20px; background: #444; border: none; border-radius: 8px;
            padding: 8px; cursor: pointer; transition: 0.2s;
        }
        .animal-grid button:hover { background: #555; transform: scale(1.1); }

        .stats {
            font-size: 18px; font-weight: bold; margin-bottom: 5px; color: var(--primary);
            transition: transform 0.1s ease;
        }
        .score-pop { transform: scale(1.3); color: #00ff00; }

        /* Tabuleiro */
        #game-container { position: relative; }
       
        #game-board {
            width: 320px; height: 320px; background-color: var(--board-bg);
            border: 4px solid #444; display: grid;
            grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(20, 1fr);
            image-rendering: pixelated; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Tela de Game Over */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            border-radius: 4px;
        }
        #game-over h2 { color: #e74c3c; font-size: 32px; margin-bottom: 10px; }
        #game-over p { font-size: 20px; margin-bottom: 20px; }

        .cell {
            width: 16px; height: 16px; display: flex; align-items: center;
            justify-content: center; position: relative;
        }

        .snake-part { font-size: 18px; position: absolute; }
        .food-item { font-size: 14px; position: absolute; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Controles */
        .game-controls { margin-top: 10px; display: flex; gap: 10px; }
        .game-controls button, .btn-restart {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-pause { background-color: #f39c12; color: white; }
        .btn-reset, .btn-restart { background-color: #e74c3c; color: white; }

        .dpad { margin-top: 15px; position: relative; width: 140px; height: 140px; }
        .dbtn {
            position: absolute; width: 45px; height: 45px; background-color: #444;
            border: 2px solid #666; color: white; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px #222;
        }
        .dbtn:active { box-shadow: 0 0 #222; transform: translateY(4px); }
        .up { top: 0; left: 47px; } .down { bottom: 0; left: 47px; }
        .left { top: 47px; left: 0; } .right { top: 47px; right: 0; }
    </style>
</head>
<body>

    <div class="game-title">🐍Link Up Animal Snake🐍</div>
   
    <div class="animal-grid" id="menu"></div>
   
    <div class="stats" id="statsDisplay">
        Nível: <span id="level">1</span> | Pontos: <span id="score">0</span>
    </div>

    <div id="game-container">
        <div id="game-board"></div>
        <div id="game-over">
            <h2>FIM DE JOGO!</h2>
            <p>Pontos: <span id="finalScore">0</span></p>
            <button class="btn-restart" onclick="resetGame()">Tentar Novamente</button>
        </div>
    </div>

    <div class="game-controls">
        <button class="btn-pause" onclick="togglePause()" id="pauseBtn">PAUSE</button>
        <button class="btn-reset" onclick="resetGame()">RESET</button>
    </div>

    <div class="dpad">
        <div class="dbtn up" onclick="changeDir('up')">▲</div>
        <div class="dbtn left" onclick="changeDir('left')">◀</div>
        <div class="dbtn right" onclick="changeDir('right')">▶</div>
        <div class="dbtn down" onclick="changeDir('down')">▼</div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('game-over');
        const statsDisplay = document.getElementById('statsDisplay');
       
        const animalData = {
            '👨': { f: '🌭', b: '🟦' }, '🚘': { f: '⛽', b:'🟥' }, '👶': { f: '🍼', b: '❄️' },
            '🐶': { f: '🦴', b: '🟫' }, '🐱': { f: '🐭', b: '🟧' }, '🦁': { f: '🥩', b: '🟨' },
            '🐯': { f: '🥩', b: '🟧' }, '🐺': { f: '🥩', b: '⬜' }, '🐸': { f: '🪰', b: '🟩' },
            '🐻': { f: '🐟', b: '🟫' }, '🐻‍': { f: '🐟', b: '⬜' }, '🐨': { f: '🌿', b: '⬜' },
            '🐼': { f: '🎋', b: '⬜' }, '🐹': { f: '🌻', b: '🟧' }, '🐰': { f: '🥕', b: '⬜' },
            '🦊': { f: '🍗', b: '🟧' }, '🐮': { f: '🌿', b: '⬜' }, '🐷': { f: '🍎', b: '🌸' },
            '🐵': { f: '🍌', b: '🟫' }, '🐲': { f: '🔥', b: '🟥' }, '🐭': { f: '🧀', b: '⬜' },
            '😾': { f: '🐭', b: '🟧' }
        };

        let currentAnimal = '👨', size = 20, snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5}, direction = {x: 0, y: 0}, lastDir = {x: 0, y: 0};
        let score = 0, level = 1, speed = 250, isPaused = false, isGameOver = false;

        // Montar menu
        Object.keys(animalData).forEach(emoji => {
            const btn = document.createElement('button');
            btn.innerText = emoji;
            btn.onclick = () => { currentAnimal = emoji; resetGame(); };
            menu.appendChild(btn);
        });

        function createBoard() {
            board.innerHTML = '';
            const config = animalData[currentAnimal];
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === food.x && y === food.y) {
                        const foodEl = document.createElement('span');
                        foodEl.className = 'food-item';
                        foodEl.innerText = config.f;
                        cell.appendChild(foodEl);
                    } else {
                        const part = snake.find(p => p.x === x && p.y === y);
                        if (part) {
                            const partEl = document.createElement('span');
                            partEl.className = 'snake-part';
                            partEl.innerText = (part === snake[0]) ? currentAnimal : config.b;
                            cell.appendChild(partEl);
                        }
                    }
                    board.appendChild(cell);
                }
            }
        }

        function changeDir(dir) {
            if (isPaused || isGameOver) return;
            if (dir === 'up' && lastDir.y !== 1) direction = {x: 0, y: -1};
            if (dir === 'down' && lastDir.y !== -1) direction = {x: 0, y: 1};
            if (dir === 'left' && lastDir.x !== 1) direction = {x: -1, y: 0};
            if (dir === 'right' && lastDir.x !== -1) direction = {x: 1, y: 0};
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "VOLTAR" : "PAUSE";
        }

        function triggerScoreEffect() {
            statsDisplay.classList.add('score-pop');
            setTimeout(() => statsDisplay.classList.remove('score-pop'), 200);
        }

        function update() {
            if (!isPaused && !isGameOver && (direction.x !== 0 || direction.y !== 0)) {
                lastDir = direction;
                const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

                // Colisão
                if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size ||
                    snake.slice(1).find(p => p.x === head.x && p.y === head.y)) {
                    showGameOver();
                    return;
                } else {
                    snake.unshift(head);
                    if (head.x === food.x && head.y === food.y) {
                        score += 10;
                        triggerScoreEffect();
                        // Dificuldade mais suave: aumenta a cada 30 pontos, reduz 15ms
                        if (score % 30 === 0) {
                            level++;
                            speed = Math.max(60, speed - 15);
                        }
                        document.getElementById('score').innerText = score;
                        document.getElementById('level').innerText = level;
                        generateFood();
                    } else { snake.pop(); }
                }
            }
            createBoard();
            setTimeout(update, speed);
        }

        function showGameOver() {
            isGameOver = true;
            document.getElementById('finalScore').innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function generateFood() {
            food = { x: Math.floor(Math.random() * size), y: Math.floor(Math.random() * size) };
            if (snake.find(p => p.x === food.x && p.y === food.y)) generateFood();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}]; direction = {x: 0, y: 0}; lastDir = {x: 0, y: 0};
            score = 0; level = 1; speed = 250; isPaused = false; isGameOver = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('level').innerText = "1";
            gameOverScreen.style.display = 'none';
            generateFood(); createBoard();
        }

        // Suporte a teclado para PC
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') changeDir('up');
            if(e.key === 'ArrowDown') changeDir('down');
            if(e.key === 'ArrowLeft') changeDir('left');
            if(e.key === 'ArrowRight') changeDir('right');
        });

        update();
    </script>
</body>
</html>
