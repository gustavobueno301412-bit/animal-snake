<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍Link Up Emoji Snake🐍</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a1a;
            --board-bg: #222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            border-bottom: 2px solid #444;
            z-index: 100;
        }

        .btn-top {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
        }

        .btn-pause { background: #f39c12; box-shadow: 0 3px #a3690b; }
        .btn-reset { background: #e74c3c; box-shadow: 0 3px #962d22; }

        .animal-selector {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            border-bottom: 1px solid #444;
        }
       
        .animal-selector button {
            flex: 0 0 50px;
            height: 50px;
            font-size: 26px;
            background: #444;
            border: 2px solid #555;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats {
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        #game-board {
            width: 320px;
            height: 320px;
            background-color: var(--board-bg);
            border: 4px solid #444;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            border-radius: 5px;
            position: relative;
        }

        .cell { position: relative; display: flex; align-items: center; justify-content: center; }
        .snake-part { font-size: 22px; position: absolute; z-index: 2; }
        .food-item { font-size: 14px; position: absolute; z-index: 1; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* AJUSTE DOS CONTROLES: Subi para não bater na barra do sistema */
        .controls-container {
            margin-top: 20px;
            margin-bottom: 80px; /* Aumentado para dar distância do fundo da tela */
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .dpad { position: relative; width: 130px; height: 130px; }

        .dbtn {
            position: absolute;
            width: 48px;
            height: 48px;
            background: #333;
            border: 2px solid #666;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px #000;
            font-size: 22px;
        }

        .up { top: 0; left: 41px; }
        .down { bottom: 0; left: 41px; }
        .left { top: 41px; left: 0; }
        .right { top: 41px; right: 0; }

        .run-btn {
            width: 75px;
            height: 75px;
            background: #e74c3c;
            border: 4px solid #c0392b;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 28px;
            box-shadow: 0 6px #8e1e14;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .run-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #8e1e14;
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <button class="btn-top btn-pause" id="pauseBtn" onclick="togglePause()">PAUSE</button>
        <span style="font-weight: bold; color: var(--primary)">SNAKE PRO</span>
        <button class="btn-top btn-reset" onclick="resetGame()">RESET</button>
    </div>

    <div class="animal-selector" id="menu"></div>

    <div class="stats">
        PONTOS: <span id="score">0</span> | NÍVEL: <span id="level">1</span>
    </div>

    <div style="position: relative;">
        <div id="game-board"></div>
        <div id="game-over">
            <h2 style="color: #e74c3c; margin-bottom: 10px;">FIM DE JOGO!</h2>
            <p style="font-size: 20px; margin-bottom: 20px;">Score: <span id="finalScore">0</span></p>
            <button class="btn-top btn-pause" onclick="resetGame()">REINICIAR JOGO</button>
        </div>
    </div>

    <div class="controls-container">
        <div class="dpad">
            <div class="dbtn up" data-dir="up">▲</div>
            <div class="dbtn left" data-dir="left">◀</div>
            <div class="dbtn right" data-dir="right">▶</div>
            <div class="dbtn down" data-dir="down">▼</div>
        </div>
        <div class="action-area">
            <div class="run-btn" id="runBtn">B</div>
        </div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const menu = document.getElementById('menu');
        const animalData = {
            '👨': { f: '🌭', b: '🟦' }, '🚘': { f: '⛽', b:'🟥' }, '👶': { f: '🍼', b: '❄️' },
            '🐶': { f: '🦴', b: '🟫' }, '🐱': { f: '🐭', b: '🟧' }, '🦁': { f: '🥩', b: '🟨' },
            '🐯': { f: '🥩', b: '🟧' }, '🐺': { f: '🥩', b: '⬜' }, '🐸': { f: '🪰', b: '🟩' },
            '🐻': { f: '🐟', b: '🟫' }, '🐻‍❄️': { f: '🐟', b: '⬜' }, '🐨': { f: '🌿', b: '⬜' },
            '🐼': { f: '🎋', b: '⬜' }, '🐹': { f: '🌻', b: '🟧' }, '🐰': { f: '🥕', b: '⬜' },
            '🦊': { f: '🍗', b: '🟧' }, '🐮': { f: '🌿', b: '⬜' }, '🐷': { f: '🍎', b: '🌸' },
            '🐵': { f: '🍌', b: '🟫' }, '🐲': { f: '🔥', b: '🟥' }, '🐭': { f: '🧀', b: '⬜' },
            '😾': { f: '🐭', b: '🟧' }
        };

        let currentAnimal = '👨', snake, food, direction, lastDir, score, level, speed, isPaused, isGameOver, isRunning, gameTimeout;

        function initVars() {
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            lastDir = {x: 0, y: 0};
            score = 0;
            level = 1;
            speed = 250;
            isPaused = false;
            isGameOver = false;
            isRunning = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('level').innerText = "1";
            document.getElementById('pauseBtn').innerText = "PAUSE";
            document.getElementById('game-over').style.display = 'none';
        }

        Object.keys(animalData).forEach(emoji => {
            const btn = document.createElement('button');
            btn.innerText = emoji;
            btn.onclick = () => { currentAnimal = emoji; resetGame(); };
            menu.appendChild(btn);
        });

        // Eventos de Direção
        document.querySelectorAll('.dbtn').forEach(btn => {
            const handle = (e) => {
                e.preventDefault();
                if(!isPaused && !isGameOver) changeDir(btn.getAttribute('data-dir'));
            };
            btn.addEventListener('touchstart', handle);
            btn.addEventListener('mousedown', handle);
        });

        // Evento do Botão Correr (B)
        const runBtn = document.getElementById('runBtn');
        runBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isRunning = true; });
        runBtn.addEventListener('touchend', (e) => { e.preventDefault(); isRunning = false; });
        runBtn.addEventListener('mousedown', () => isRunning = true);
        runBtn.addEventListener('mouseup', () => isRunning = false);

        function changeDir(dir) {
            if (dir === 'up' && lastDir.y !== 1) direction = {x: 0, y: -1};
            if (dir === 'down' && lastDir.y !== -1) direction = {x: 0, y: 1};
            if (dir === 'left' && lastDir.x !== 1) direction = {x: -1, y: 0};
            if (dir === 'right' && lastDir.x !== -1) direction = {x: 1, y: 0};
        }

        function createBoard() {
            board.innerHTML = '';
            const config = animalData[currentAnimal] || animalData['👨'];
            for (let y = 0; y < 20; y++) {
                for (let x = 0; x < 20; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === food.x && y === food.y) cell.innerHTML = `<span class="food-item">${config.f}</span>`;
                    const partIdx = snake.findIndex(p => p.x === x && p.y === y);
                    if (partIdx !== -1) cell.innerHTML = `<span class="snake-part">${partIdx === 0 ? currentAnimal : config.b}</span>`;
                    board.appendChild(cell);
                }
            }
        }

        function update() {
            if (isGameOver) return;
            if (!isPaused && (direction.x !== 0 || direction.y !== 0)) {
                lastDir = direction;
                const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
               
                if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.find(p => p.x === head.x && p.y === head.y)) {
                    isGameOver = true;
                    document.getElementById('finalScore').innerText = score;
                    document.getElementById('game-over').style.display = 'flex';
                    return;
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    if (score % 30 === 0) { level++; speed = Math.max(60, speed - 15); }
                    document.getElementById('score').innerText = score;
                    document.getElementById('level').innerText = level;
                    generateFood();
                } else { snake.pop(); }
            }
            createBoard();
            gameTimeout = setTimeout(update, isRunning ? speed / 2.5 : speed);
        }

        function generateFood() {
            food = { x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20) };
            if (snake.find(p => p.x === food.x && p.y === food.y)) generateFood();
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "VOLTAR" : "PAUSE";
        }

        function resetGame() {
            clearTimeout(gameTimeout);
            initVars();
            generateFood();
            update();
        }

        initVars();
        generateFood();
        update();
    </script>
</body>
</html>
